<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizUp</title>
    <link rel="stylesheet" href="Quiz.css">
    
</head>
<body>
       
    <div class="info-container">
        <div class="Qno">Qno: 1</div>
        <div class="time">Time: 30s</div>
     </div>
    
    <div class="Container" >
        <div class="Question">
            who is prime minister of india ?
        </div>
        <div class="Options">
          <button class="option1">NarendraModi</button>
          <button class="option2">Kcr</button>
          <button class="option3">PranamMukarjee</button>
          <button class="option4">Revanth reddy</button>
        </div>
        <div class="Navigation">
         <button class="prev">Previous</button>
         <button class="next">Next</button>
        </div>
    </div>    
</body>
</html>
